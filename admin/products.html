<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت محصولات | Aproject Admin</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/admin/products.css">

</head>

<body>

    <div class="sidebar">
        <h2>APROJECT</h2>

        <ul class="nav-links">
            <li><a href="index.html">داشبورد</a></li>
            <li><a href="categories.html">دسته‌بندی‌ها</a></li>
            <li><a href="products.html" class="active">محصولات</a></li>
            <li><a href="orders.html">سفارشات</a></li>
            <li><a href="customers.html">مشتریان</a></li>
            <li><a href="/" id="logoutBtn">خروج</a></li>
        </ul>
    </div>

    <div class="main-content">

<div class="header-row">

<h1>محصولات</h1>

<input
type="text"
id="searchProduct"
placeholder="جستجوی نام محصول..."
style="padding:8px;width:220px;border:1px solid #ddd;border-radius:6px"
>

<button class="btn btn-primary" id="addProductBtn">افزودن محصول جدید</button>

</div>


        <table>

            <thead>
                <tr>
                    <th>تصویر</th>
                    <th>نام محصول</th>
                    <th>دسته‌بندی</th>
                    <th>قیمت</th>
                    <th>موجودی</th>
                    <th>ویژه</th>
                    <th>عملیات</th>
                </tr>
            </thead>

            <tbody id="productsTableBody"></tbody>

        </table>

    </div>


    <!-- modal -->

    <div id="productModal" class="modal">

        <div class="modal-content">

            <h2 id="modalTitle">افزودن محصول</h2>

            <form id="productForm" enctype="multipart/form-data">

                <input type="hidden" id="productId">

                <div class="form-group">
                    <label>نام محصول</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label>قیمت
                        (تومان)
                    </label>

                    <input type="text" id="productPrice" required>
                </div>

                <div class="form-group">

                    <label>تصویر محصول</label>

                    <input type="file" id="productImage" name="image" accept="image/*">

                    <div style="margin-top:10px">
                        <img id="imagePreview" style="max-width:200px;display:none;border-radius:10px">
                    </div>

                </div>

                <div class="form-group">
                    <label>موجودی کل</label>
                    <input type="number" id="productStock" required>
                </div>

                <div class="form-group">
                    <label>دسته‌بندی</label>
                    <select id="productCategory"></select>
                </div>

                <div class="form-group">
                    <label>مدیریت سایزها</label>

                    <div id="sizeManagementContainer" style="border:1px solid #eee;padding:1rem;"></div>

                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isFeatured">
                        نمایش در ویترین
                    </label>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">ذخیره</button>
                    <button type="button" class="btn" onclick="closeModal()">انصراف</button>
                </div>

            </form>

        </div>

    </div>


    <script>
let categories = [];
let allProducts = []; // ← همه محصولات برای جستجو نگهداری می‌شوند
let allSizes = [];

/* تابع ساختن سایز‌ها بر اساس دسته‌بندی */
function renderSizeInputs(categoryId) {
  const container = document.getElementById("sizeManagementContainer");
  if (!categoryId) {
    container.innerHTML = '<p style="color:#777;font-size:0.9rem">ابتدا دسته‌بندی را انتخاب کنید</p>';
    return;
  }

  // نمایش سایزهای مربوط به این دسته‌بندی (فقط آنهایی که فعال هستند)
  const categorySizes = allSizes.filter(s => s.category_id == categoryId && s.is_enabled);

  if (categorySizes.length === 0) {
    container.innerHTML = '<p style="color:#777;font-size:0.9rem">سایزی برای این دسته‌بندی تعریف نشده است</p>';
    return;
  }

  container.innerHTML = categorySizes.map(s => `
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:8px">
      <span style="display:inline-block;padding:2px 8px;background:#f0f0f0;border-radius:4px;font-size:0.9rem">${s.size_name}</span>
    </div>
  `).join("");
}

/* رندر کردن جدول محصولات */
function renderProducts(products) {
  const body = document.getElementById("productsTableBody");
  if (!products.length) {
    body.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#777;">محصولی یافت نشد</td></tr>`;
    return;
  }
  body.innerHTML = products
    .map(
      (p) => `
    <tr>
      <td><img src="${
        p.image ? p.image : "../assets/img/no-image.png"
      }" class="product-img"></td>
      <td>${p.name}</td>
      <td>${p.category_name || "-"}</td>
      <td>${Number(p.price).toLocaleString("fa-IR")}</td>
      <td>${p.stock}</td>
      <td>${p.is_featured ? "✅" : "❌"}</td>
      <td>
        <button class="action-btn edit-btn" onclick="editProduct(${p.id})">ویرایش</button>
        <button class="action-btn delete-btn" onclick="deleteProduct(${p.id})">حذف</button>
      </td>
    </tr>`
    )
    .join("");
}

/* بارگذاری اولیه محصولات و دسته‌بندی‌ها */
async function loadData() {
  try {
    const [prodRes, catRes, sizeRes] = await Promise.all([
      fetch("../api/admin/products.php"),
      fetch("../api/admin/categories.php"),
      fetch("../api/admin/sizes.php")
    ]);

    if (!prodRes.ok || !catRes.ok || !sizeRes.ok) throw new Error("خطا در دریافت اطلاعات از سرور");

    allProducts = (await prodRes.json()).data || [];
    categories = (await catRes.json()).data || [];
    allSizes = (await sizeRes.json()).data || [];

    const catSelect = document.getElementById("productCategory");
    catSelect.innerHTML =
      '<option value="">انتخاب دسته‌بندی...</option>' +
      categories.map((c) => `<option value="${c.id}">${c.name}</option>`).join("");

    renderProducts(allProducts);
  } catch (err) {
    console.error("Load Data Error:", err);
    alert("خطا در بارگذاری اطلاعات.");
  }
}

/* مودال */
const modal = document.getElementById("productModal");

document.getElementById("addProductBtn").onclick = () => {
  document.getElementById("productForm").reset();
  document.getElementById("productId").value = "";
  document.getElementById("imagePreview").style.display = "none";
  renderSizeInputs("");
  document.getElementById("modalTitle").textContent = "افزودن محصول";
  modal.style.display = "block";
};

/* تغییر دسته‌بندی و بروزرسانی سایزها */
document.getElementById("productCategory").onchange = (e) => {
  renderSizeInputs(e.target.value);
};

function closeModal() {
  modal.style.display = "none";
}

/* بستن مودال با کلیک بیرون یا ESC */
window.onclick = function (event) {
  if (event.target === modal) closeModal();
};
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

/* دریافت اطلاعات برای ویرایش */
async function editProduct(id) {
  const res = await fetch(`../api/admin/products.php?id=${id}`);
  const data = await res.json();
  const product = data.data;

  document.getElementById("productId").value = product.id;
  document.getElementById("productName").value = product.name;
  document.getElementById("productPrice").value = Number(product.price).toLocaleString("en-US");
  document.getElementById("productStock").value = product.stock;
  document.getElementById("productCategory").value = product.category_id || "";
  document.getElementById("isFeatured").checked = product.is_featured == 1;

  const preview = document.getElementById("imagePreview");
  if (product.image) {
    preview.src = product.image;
    preview.style.display = "block";
  } else {
    preview.style.display = "none";
  }

  renderSizeInputs(product.category_id);
  document.getElementById("modalTitle").textContent = "ویرایش محصول";
  modal.style.display = "block";
}

/* ارسال فرم افزودن یا ویرایش */
document.getElementById("productForm").onsubmit = async (e) => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("id", document.getElementById("productId").value);

  const rawPrice = document.getElementById("productPrice").value.replace(/,/g, "");
  formData.append("price", rawPrice);
  formData.append("name", document.getElementById("productName").value);
  formData.append("stock", document.getElementById("productStock").value);
  formData.append("category_id", document.getElementById("productCategory").value);
  formData.append("is_featured", document.getElementById("isFeatured").checked ? 1 : 0);

  const imageFile = document.getElementById("productImage").files[0];
  if (imageFile) formData.append("image", imageFile);

  try {
      const res = await fetch("../api/admin/products.php", { method: "POST", body: formData });
      const result = await res.json();

      if (result.success) {
        closeModal();
        loadData();
      } else {
        alert("خطا در ذخیره محصول: " + (result.message || "خطای ناشناخته"));
      }
  } catch (error) {
      console.error("Save Product Error:", error);
      alert("خطا در برقراری ارتباط با سرور.");
  }
};

/* حذف محصول */
async function deleteProduct(id) {
  if (confirm("حذف شود؟")) {
    await fetch(`../api/admin/products.php?id=${id}`, { method: "DELETE" });
    loadData();
  }
}

/* پیش‌نمایش عکس */
const imageInput = document.getElementById("productImage");
const preview = document.getElementById("imagePreview");

imageInput.addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
});

/* جدا کردن سه رقمی در تایپ قیمت */
const priceInput = document.getElementById("productPrice");
priceInput.addEventListener("input", function () {
  let value = this.value.replace(/,/g, "");
  if (!isNaN(value) && value !== "") {
    this.value = Number(value).toLocaleString("en-US");
  }
});

/* جستجو نام محصول */
document.getElementById("searchProduct").addEventListener("input", function () {
  const value = this.value.toLowerCase();
  const filtered = allProducts.filter((p) => p.name.toLowerCase().includes(value));
  renderProducts(filtered);
});

/* بارگذاری اولیه */
loadData();
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            fetch('../api/admin/logout.php').then(() => window.location.href = 'login.html');
        });

</script>


</body>

</html>
