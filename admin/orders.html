<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت سفارشات | Aproject Admin</title>
    <style>
        :root { --sidebar-width: 250px; }
        body { display: flex; background-color: #f8f9fa; margin: 0; font-family: sans-serif; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background-color: #111; color: #fff; height: 100vh; position: fixed; padding: 2.5rem 1.5rem; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 3rem; text-align: center; }
        .nav-links { list-style: none; padding: 0; margin: 0; }
        .nav-links li { margin-bottom: 1.25rem; }
        .nav-links a { color: #aaa; text-decoration: none; font-size: 0.9rem; display: block; }
        .nav-links a:hover { color: #fff; }
        .nav-links a.active { color: #fff; font-weight: 600; }

        /* Main Content */
        .main-content { margin-right: var(--sidebar-width); flex-grow: 1; padding: 3rem; box-sizing: border-box; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 2rem; }
        th { font-size: 0.85rem; color: #555; font-weight: 600; text-align: right; padding: 1.1rem 1rem; border-bottom: 1px solid #eee; }
        td { text-align: right; padding: 1.1rem 1rem; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        tbody tr:hover { background: #fafafa; }
        
        /* Buttons & Inputs */
        .btn { padding: 0.3rem 0.6rem; cursor: pointer; border: none; background: #f0f0f0; font-size: 0.8rem; font-family: inherit; }
        .btn:hover { background: #e0e0e0; }
        .btn-primary { background: #111; color: #fff; padding: 0.55rem 1.2rem; }
        .btn-primary:hover { background: #000; }
        .status-select { padding: 0.3rem; border: 1px solid #ddd; font-family: inherit; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.5); }
        .modal-content { background: #fff; margin: 3% auto; padding: 2rem; width: 80%; max-width: 600px; max-height: 70vh; overflow-y: auto; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>APROJECT</h2>
        <ul class="nav-links">
            <li><a href="index.html">داشبورد</a></li>
            <li><a href="categories.html">دسته‌بندی‌ها</a></li>
            <li><a href="products.html">محصولات</a></li>
            <li><a href="orders.html" class="active">سفارشات</a></li>
            <li><a href="customers.html">مشتریان</a></li>
            <li><a href="#" id="logoutBtn">خروج</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1>سفارشات</h1>
        <table>
            <thead>
                <tr>
                    <th>شناسه</th>
                    <th>مشتری</th>
                    <th>مبلغ</th>
                    <th>وضعیت</th>
                    <th>تاریخ</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody"></tbody>
        </table>
    </div>

    <!-- Order Details Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2>جزئیات سفارش</h2>
            <div id="orderDetailsContent" style="margin-top:1.5rem;"></div>
            <button onclick="closeOrderModal()" class="btn btn-primary" style="margin-top:2rem;">بستن</button>
        </div>
    </div>

    <script>
        const orderModal = document.getElementById('orderModal');
        const orderContent = document.getElementById('orderDetailsContent');

        function closeOrderModal() { orderModal.style.display = 'none'; }

        async function loadOrders() {
            const res = await fetch('../api/admin/orders.php');
            const orders = (await res.json()).data;
            const body = document.getElementById('ordersTableBody');
            body.innerHTML = orders.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.full_name}</td>
                    <td>${Number(o.total_price).toLocaleString('fa-IR')}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
                            <option value="Pending" ${o.status == 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="Confirmed" ${o.status == 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                            <option value="Processing" ${o.status == 'Processing' ? 'selected' : ''}>Processing</option>
                            <option value="Shipped" ${o.status == 'Shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="Delivered" ${o.status == 'Delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="Rejected" ${o.status == 'Rejected' ? 'selected' : ''}>Rejected</option>
                        </select>
                    </td>
                    <td>${new Date(o.created_at).toLocaleDateString('fa-IR')}</td>
                    <td><button class="btn" onclick="viewOrder(${o.id})">مشاهده جزئیات</button></td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch('../api/admin/orders.php', {
                method: 'POST',
                body: JSON.stringify({ id, status })
            });
            alert('وضعیت تغییر کرد');
        }

        async function viewOrder(id) {
            const res = await fetch(`../api/admin/orders.php?id=${id}`);
            const order = (await res.json()).data;

            orderContent.innerHTML = `
                <div style="margin-bottom: 2rem; line-height: 2;">
                    <p><strong>مشتری:</strong> ${order.full_name}</p>
                    <p><strong>تلفن:</strong> ${order.phone_number}</p>
                    <p><strong>آدرس:</strong> ${order.address}</p>
                    <p><strong>تاریخ:</strong> ${new Date(order.created_at).toLocaleString('fa-IR')}</p>
                    <p><strong>وضعیت:</strong> ${order.status}</p>
                </div>
                <h3>اقلام سفارش</h3>
                <table style="width:100%; margin-top:1rem;">
                    <thead>
                        <tr>
                            <th>محصول</th>
                            <th>سایز</th>
                            <th>تعداد</th>
                            <th>قیمت</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${order.items.map(item => `
                            <tr>
                                <td>${item.product_name}</td>
                                <td>${item.size}</td>
                                <td>${item.quantity}</td>
                                <td>${Number(item.price).toLocaleString('fa-IR')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <p style="margin-top:1.5rem; font-size:1.1rem;"><strong>جمع کل:</strong> ${Number(order.total_price).toLocaleString('fa-IR')} تومان</p>
            `;
            orderModal.style.display = 'block';
        }

        loadOrders();
    </script>
</body>
</html>
