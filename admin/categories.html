<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت دسته‌بندی‌ها | Aproject Admin</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        :root {
            --sidebar-width: 250px;
            --sidebar-bg: #111;
            --sidebar-text: #fff;
            --page-bg: #f8f9fa;
            --card-bg: #fff;
            --border-color: #e9ecef;
            --text-main: #111;
            --text-muted: #777;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            background-color: var(--page-bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            inset-inline-start: 0;
            top: 0;
            padding: 2rem 1.4rem;
            border-inline-end: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 1rem;
            letter-spacing: 0.24em;
            margin: 0 0 2.5rem 0;
            text-align: center;
            font-weight: 600;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links li {
            margin-bottom: 0.5rem;
        }

        .nav-links a {
            color: #bdbdbd;
            text-decoration: none;
            font-size: 0.92rem;
            display: block;
            padding: 0.7rem 0.9rem;
            line-height: 1.4;
            border: 1px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            border-color: #2a2a2a;
            background-color: #171717;
        }

        .main-content {
            margin-right: var(--sidebar-width);
            flex-grow: 1;
            padding: 2.5rem 2.5rem 3rem;
            min-width: 0;
        }

        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* برای ریسپانسیو بودن */
            gap: 1rem; /* فاصله بین آیتم‌ها در حالت ریسپانسیو */
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 700;
        }

        .add-category-controls {
            display: flex;
            gap: 0.75rem; /* کاهش فاصله بین input و button */
            align-items: center;
            flex-wrap: wrap; /* برای ریسپانسیو بودن */
        }

        .add-category-controls input[type="text"] {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            flex-grow: 1; /* اجازه رشد در موبایل */
        }

        .btn {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--text-main);
            color: var(--sidebar-text);
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            background-color: #333;
            border-color: #333;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* حداقل عرض برای جدول */
        }

        th, td {
            text-align: right;
            padding: 1rem 1.1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 0.9rem;
        }

        th {
            background-color: #fcfcfc;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        tbody tr:hover {
            background-color: #fafafa;
        }

        .action-btn {
            background-color: #ef4444; /* رنگ قرمز برای حذف */
            color: #fff;
            padding: 0.5rem 0.9rem;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: background-color 0.2s ease;
        }

        .action-btn:hover {
            background-color: #dc2626;
        }


        /* Mobile Topbar for Categories Page */
        .mobile-topbar {
            display: none;
        }

        @media (max-width: 960px) {
            body {
                display: block;
            }

            .sidebar {
                transform: translateX(100%);
                transition: transform 0.25s ease;
                z-index: 50;
                width: min(280px, 86vw);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-right: 0;
                padding: 5rem 1rem 1.5rem; /* افزایش پدینگ بالا برای دکمه منو */
            }

            .mobile-topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                position: fixed;
                top: 0;
                inset-inline: 0;
                z-index: 60;
                background: rgba(248,249,250,0.96);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid var(--border-color);
                padding: 0.85rem 1rem;
            }

            .mobile-topbar .title {
                font-size: 0.95rem;
                font-weight: 700;
            }

            .mobile-menu-btn {
                border: 1px solid #ddd;
                background: #fff;
                color: #111;
                padding: 0.55rem 0.8rem;
                font-size: 1rem;
                cursor: pointer;
                border-radius: 0;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .add-category-controls {
                width: 100%; /* اشغال تمام عرض در موبایل */
            }

            .add-category-controls input[type="text"] {
                width: 100%;
            }

            .table-wrap {
                margin-top: 1rem; /* برای فاصله از کنترل‌های بالا */
            }
        }

        @media (max-width: 640px) {
            .page-header h1 {
                font-size: 1.4rem;
            }

            th, td {
                padding: 0.85rem 0.9rem;
                font-size: 0.85rem;
            }

            .action-btn {
                padding: 0.4rem 0.7rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-topbar">
        <div class="title">APROJECT</div>
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
    </div>

    <aside class="sidebar" id="sidebar">
        <h2>APROJECT</h2>
        <ul class="nav-links">
            <li><a href="index.html">داشبورد</a></li>
            <li><a href="categories.html" class="active">دسته‌بندی‌ها</a></li>
            <li><a href="sizes.html">سایزها</a></li>
            <li><a href="products.html">محصولات</a></li>
            <li><a href="orders.html">سفارشات</a></li>
            <li><a href="customers.html">مشتریان</a></li>
            <li><a href="/" id="logoutBtn">خروج</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>دسته‌بندی‌ها</h1>
            <div class="add-category-controls">
                <input type="text" id="catName" placeholder="نام دسته‌بندی جدید">
                <button class="btn" id="addCatBtn">افزودن</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>شناسه</th>
                        <th>نام</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="catTableBody">
                    <!-- Data via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadCats() {
            try {
                const res = await fetch('../api/admin/categories.php');

                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }

                const result = await res.json();
                if (result.success) {
                    const cats = result.data;
                    document.getElementById('catTableBody').innerHTML = cats.map(c => `
                        <tr>
                            <td>${c.id}</td>
                            <td>${c.name}</td>
                            <td><button class="action-btn" onclick="deleteCat(${c.id})">حذف</button></td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        document.getElementById('addCatBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('catName');
            const name = nameInput.value.trim();
            if (!name) {
                alert('لطفاً نام دسته‌بندی را وارد کنید.');
                return;
            }
            try {
                const res = await fetch('../api/admin/categories.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }

                const result = await res.json();
                if (result.success) {
                    nameInput.value = '';
                    loadCats();
                } else {
                    alert('خطا در افزودن دسته‌بندی: ' + (result.message || 'ناموفق'));
                }
            } catch (error) {
                console.error('Error adding category:', error);
                alert('خطایی رخ داد.');
            }
        });

        async function deleteCat(id) {
            if (confirm('آیا از حذف این دسته‌بندی اطمینان دارید؟ این عمل قابل بازگشت نیست!')) {
                try {
                    const res = await fetch(`../api/admin/categories.php?id=${id}`, { method: 'DELETE' });

                    if (res.status === 401) {
                        window.location.href = 'login.html';
                        return;
                    }

                    const result = await res.json();
                    if (result.success) {
                        loadCats();
                    } else {
                        alert('خطا در حذف دسته‌بندی: ' + (result.message || 'ناموفق'));
                    }
                } catch (error) {
                    console.error('Error deleting category:', error);
                    alert('خطایی رخ داد.');
                }
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            fetch('../api/admin/logout.php').then(() => window.location.href = 'login.html');
        });

        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');

        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });
        }

        loadCats();
    </script>
</body>
</html>
