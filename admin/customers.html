<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لیست مشتریان | Aproject Admin</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        :root { --sidebar-width: 250px; }
        body { display: flex; background-color: #f8f9fa; }
        .sidebar { width: var(--sidebar-width); background-color: #111; color: #fff; height: 100vh; position: fixed; padding: 2rem 1.5rem; }
        .sidebar h2 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 3rem; text-align: center; }
        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 1.5rem; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 0.9rem; }
        .nav-links a.active { color: #fff; }
        .main-content { margin-right: var(--sidebar-width); flex-grow: 1; padding: 3rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { text-align: right; padding: 1rem; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>APROJECT</h2>
        <ul class="nav-links">
            <li><a href="index.html">داشبورد</a></li>
            <li><a href="categories.html">دسته‌بندی‌ها</a></li>
            <li><a href="products.html">محصولات</a></li>
            <li><a href="orders.html">سفارشات</a></li>
            <li><a href="customers.html" class="active">مشتریان</a></li>
            <li><a href="#" id="logoutBtn">خروج</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1>مشتریان</h1>
        <table style="margin-top: 2rem;">
            <thead>
                <tr>
                    <th>شناسه</th>
                    <th>نام و نام خانوادگی</th>
                    <th>شماره موبایل</th>
                    <th>آدرس</th>
                    <th>تاریخ عضویت</th>
                </tr>
            </thead>
            <tbody id="customersTableBody"></tbody>
        </table>
    </div>

    <script>
        async function loadCustomers() {
            const res = await fetch('../api/admin/customers.php');
            const data = (await res.json()).data;
            document.getElementById('customersTableBody').innerHTML = data.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.full_name}</td>
                    <td>${c.phone_number}</td>
                    <td>${c.address}</td>
                    <td>${new Date(c.created_at).toLocaleDateString('fa-IR')}</td>
                </tr>
            `).join('');
        }
        loadCustomers();
    </script>
</body>
</html>
