<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لیست مشتریان | Aproject Admin</title>
    <style>
        :root { --sidebar-width: 250px; }
        body { display: flex; background-color: #f8f9fa; margin: 0; font-family: sans-serif; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background-color: #111; color: #fff; height: 100vh; position: fixed; padding: 2.5rem 1.5rem; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 3rem; text-align: center; }
        .nav-links { list-style: none; padding: 0; margin: 0; }
        .nav-links li { margin-bottom: 1.25rem; }
        .nav-links a { color: #aaa; text-decoration: none; font-size: 0.9rem; display: block; }
        .nav-links a:hover { color: #fff; }
        .nav-links a.active { color: #fff; font-weight: 600; }

        /* Main Content */
        .main-content { margin-right: var(--sidebar-width); flex-grow: 1; padding: 3rem; box-sizing: border-box; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 2rem; }
        th { font-size: 0.85rem; color: #555; font-weight: 600; text-align: right; padding: 1.1rem 1rem; border-bottom: 1px solid #eee; }
        td { text-align: right; padding: 1.1rem 1rem; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        tbody tr:hover { background: #fafafa; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>APROJECT</h2>
        <ul class="nav-links">
            <li><a href="index.html">داشبورد</a></li>
            <li><a href="categories.html">دسته‌بندی‌ها</a></li>
            <li><a href="products.html">محصولات</a></li>
            <li><a href="orders.html">سفارشات</a></li>
            <li><a href="customers.html" class="active">مشتریان</a></li>
            <li><a href="/" id="logoutBtn">خروج</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1>مشتریان</h1>
        <table>
            <thead>
                <tr>
                    <th>شناسه</th>
                    <th>نام و نام خانوادگی</th>
                    <th>شماره موبایل</th>
                    <th>آدرس</th>
                    <th>تاریخ عضویت</th>
                </tr>
            </thead>
            <tbody id="customersTableBody"></tbody>
        </table>
    </div>

    <script>
        async function loadCustomers() {
            try {
                const res = await fetch('../api/admin/customers.php');
                const data = (await res.json()).data;
                document.getElementById('customersTableBody').innerHTML = data.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.full_name}</td>
                        <td>${c.phone_number}</td>
                        <td>${c.address}</td>
                        <td>${new Date(c.created_at).toLocaleDateString('fa-IR')}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error loading customers:", err);
            }
        }
        loadCustomers();
                document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            fetch('../api/admin/logout.php').then(() => window.location.href = 'login.html');
        });

    </script>
</body>
</html>
