<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت | داشبورد</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        :root {
            --sidebar-width: 250px;
        }
        body {
            display: flex;
            background-color: #f8f9fa;
        }
        .sidebar {
            width: var(--sidebar-width);
            background-color: #111;
            color: #fff;
            height: 100vh;
            position: fixed;
            padding: 2rem 1.5rem;
        }
        .sidebar h2 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 3rem;
            text-align: center;
        }
        .nav-links {
            list-style: none;
        }
        .nav-links li {
            margin-bottom: 1.5rem;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            display: block;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }
        .main-content {
            margin-right: var(--sidebar-width);
            flex-grow: 1;
            padding: 3rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: #fff;
            padding: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            text-align: center;
        }
        .stat-card h3 {
            font-size: 0.85rem;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .stat-card p {
            font-size: 2rem;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        th, td {
            text-align: right;
            padding: 1.2rem;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #fcfcfc;
            font-size: 0.85rem;
            color: #555;
            text-transform: uppercase;
        }
        .status-badge {
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-delivered { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>APROJECT</h2>
        <ul class="nav-links">
            <li><a href="index.html" class="active">داشبورد</a></li>
            <li><a href="categories.html">دسته‌بندی‌ها</a></li>
            <li><a href="products.html">محصولات</a></li>
            <li><a href="orders.html">سفارشات</a></li>
            <li><a href="customers.html">مشتریان</a></li>
            <li><a href="#" id="logoutBtn">خروج</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 style="margin-bottom: 2rem;">خلاصه وضعیت</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>کل مشتریان</h3>
                <p id="totalCustomers">-</p>
            </div>
            <div class="stat-card">
                <h3>کل محصولات</h3>
                <p id="totalProducts">-</p>
            </div>
            <div class="stat-card">
                <h3>سفارشات فعال</h3>
                <p id="activeOrders">-</p>
            </div>
            <div class="stat-card">
                <h3>سفارشات تکمیل شده</h3>
                <p id="completedOrders">-</p>
            </div>
        </div>

        <h2 style="margin-bottom: 1.5rem;">آخرین سفارشات</h2>
        <table>
            <thead>
                <tr>
                    <th>شناسه</th>
                    <th>مشتری</th>
                    <th>مبلغ کل</th>
                    <th>وضعیت</th>
                    <th>تاریخ</th>
                </tr>
            </thead>
            <tbody id="recentOrdersBody">
                <!-- Data via JS -->
            </tbody>
        </table>
    </div>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('../api/admin/stats.php');
                const result = await res.json();
                if (result.success) {
                    const data = result.data;
                    document.getElementById('totalCustomers').textContent = data.total_customers;
                    document.getElementById('totalProducts').textContent = data.total_products;
                    document.getElementById('activeOrders').textContent = data.active_orders;
                    document.getElementById('completedOrders').textContent = data.completed_orders;

                    const body = document.getElementById('recentOrdersBody');
                    body.innerHTML = data.recent_orders.map(o => `
                        <tr>
                            <td>#${o.id}</td>
                            <td>${o.full_name}</td>
                            <td>${Number(o.total_price).toLocaleString('fa-IR')} تومان</td>
                            <td><span class="status-badge status-${o.status.toLowerCase()}">${o.status}</span></td>
                            <td>${new Date(o.created_at).toLocaleDateString('fa-IR')}</td>
                        </tr>
                    `).join('');
                } else if (response.status === 401) {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            fetch('../api/admin/logout.php').then(() => window.location.href = 'login.html');
        });

        loadStats();
    </script>
</body>
</html>
