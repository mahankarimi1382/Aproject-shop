<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبد خرید | Aproject</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/cart.css">
    <script type="module" src="assets/js/cart-page.js"></script>


</head>

<body>

    <!-- Header -->
    <header>
        <div class="header-links">
            <a href="index.html">بازگشت به فروشگاه</a>
        </div>
        <div class="logo">Aproject</div>
        <div style="width: 100px;"></div> <!-- Spacer for flex alignment -->
    </header>

    <!-- Main Cart Content -->
    <main class="cart-container">

        <h1 class="page-title">سبد خرید <span>(۲ آیتم)</span></h1>

        <div class="cart-layout">

            <!-- ستون سمت راست: لیست محصولات -->
            <div class="cart-items">
                <!-- محصولات توسط JS رندر می‌شوند -->
            </div>

            <!-- ستون سمت چپ: فاکتور و پرداخت -->
            <div class="order-summary">
                <h2 class="summary-title">خلاصه سفارش</h2>

                <div class="summary-row">
                    <span>مبلغ کالاها (۲ آیتم)</span>
                    <span>۶,۰۰۰,۰۰۰ تومان</span>
                </div>

                <div class="summary-row">
                    <span>هزینه بسته‌بندی ویژه</span>
                    <span>رایگان</span>
                </div>

                <div class="summary-row">
                    <span>هزینه ارسال</span>
                    <span>وابسته به آدرس</span>
                </div>

                <div class="summary-divider"></div>

                <div class="summary-total">
                    <span>جمع کل</span>
                    <span>۶,۰۰۰,۰۰۰ تومان</span>
                </div>

                <button class="checkout-btn">تکمیل خرید / Checkout</button>

                <a href="index.html" class="continue-shopping">بازگشت و ادامه خرید</a>
            </div>

        </div>
    </main>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 class="modal-title">تکمیل اطلاعات ارسال</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="fullName">نام و نام خانوادگی</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="مثال: علی علوی">
                </div>
                <div class="form-group">
                    <label for="phone">شماره موبایل</label>
                    <input type="tel" id="phone" name="phone" required placeholder="۰۹۱۲۳۴۵۶۷۸۹" pattern="09[0-9]{9}">
                </div>
                <div class="form-group">
                    <label for="address">آدرس کامل پستی</label>
                    <textarea id="address" name="address" required placeholder="استان، شهر، خیابان..."></textarea>
                </div>
                <button type="submit" class="submit-order-btn">ثبت سفارش و پرداخت</button>
            </form>
        </div>
    </div>

</body>

</html>
